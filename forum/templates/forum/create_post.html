<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создать тему</title>
    <!-- Подключаю Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* Легкий фон страницы, как на главной */
        body { background-color: #f8f9fa; }
        
        /* Делаю стандартную форму Django красивой под стиль Bootstrap */
        form p {
            margin-bottom: 1.5rem;
        }
        form p label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #495057;
        }
        form p input[type="text"], 
        form p textarea, 
        form p select {
            display: block;
            width: 100%;
            padding: 0.5rem 0.75rem;
            font-size: 1rem;
            font-weight: 400;
            line-height: 1.5;
            color: #212529;
            background-color: #fff;
            border: 1px solid #ced4da;
            border-radius: 0.375rem;
            transition: border-color .15s ease-in-out, box-shadow .15s ease-in-out;
        }
        form p input[type="text"]:focus, 
        form p textarea:focus, 
        form p select:focus {
            border-color: #86b7fe;
            outline: 0;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        }
        /* Делаю поле ввода текста чуть больше */
        form p textarea {
            min-height: 150px;
        }
        /* Убираю маркеры у ошибок формы */
        ul.errorlist {
            color: #dc3545;
            list-style: none;
            padding: 0;
            font-size: 0.875em;
            margin-top: 0.25rem;
        }
    </style>
</head>

<body>

<div class="container mt-5 pb-5">

    <!-- Ограничиваю ширину, чтобы форма не растягивалась на весь экран -->
    <div class="row">
        <div class="col-lg-8 col-md-10 mx-auto">
            
            <!-- Кнопка назад -->
            <a href="/" class="text-decoration-none text-secondary mb-3 d-inline-block">
                &larr; Вернуться на главную
            </a>

            <!-- Карточка формы -->
            <div class="card shadow-sm border-0">
                <div class="card-header bg-dark text-white p-3">
                    <h3 class="mb-0">✍️ Создать новую тему</h3>
                </div>
                
                <div class="card-body p-4 bg-white">
                    
                    <p class="text-muted mb-4">
                        Заполните поля ниже, чтобы начать новое обсуждение на форуме. Постарайтесь придумать понятный заголовок.
                    </p>

                    <!-- Сама форма -->
                    <form method="post">
                        {% csrf_token %}

                        <!-- Вывод полей Django -->
                        {{ form.as_p }}

                        <hr class="my-4 text-muted">

                        <div class="d-flex justify-content-between align-items-center">
                            <a href="/" class="btn btn-outline-secondary">Отмена</a>
                            <button type="submit" class="btn btn-success px-4 fw-bold">
                                Опубликовать тему
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>

<!-- Скрипт: Счетчик символов и защита от закрытия -->
<script>
    document.addEventListener("DOMContentLoaded", function() {
        
        // 1. ДИНАМИЧЕСКИЙ СЧЕТЧИК СИМВОЛОВ
        
        // Находим многострочное текстовое поле (textarea), которое сгенерировал Django
        const textarea = document.querySelector('form textarea');
        
        if (textarea) {
            // Создаю блок для текста счетчика
            const counterDiv = document.createElement('div');
            counterDiv.className = 'text-end small mt-1 text-muted';
            counterDiv.id = 'charCounter';
            counterDiv.innerText = `Введено символов: ${textarea.value.length}`;
            
            // Вставляю счетчик сразу после текстового поля
            textarea.parentNode.insertBefore(counterDiv, textarea.nextSibling);
            
            // Читает каждое нажатие клавиши в поле
            textarea.addEventListener('input', function() {
                const currentLength = this.value.length;
                counterDiv.innerText = `Введено символов: ${currentLength}`;
                
                // Если текста слишком много (больше 2000), делает текст красным
                if (currentLength > 2000) {
                    counterDiv.classList.replace('text-muted', 'text-danger');
                } else {
                    counterDiv.classList.replace('text-danger', 'text-muted');
                }
            });
        }

        // 2. ЗАЩИТА ОТ ПОТЕРИ ТЕКСТА
        
        let isFormDirty = false; // Переменная: менял ли пользователь что-то в форме
        let isSubmitting = false; // Переменная: нажал ли пользователь кнопку "Опубликовать"
        const form = document.querySelector('form');

        // Отслеживается изменения во всех полях ввода (текст, селекты, текстареи)
        const inputs = form.querySelectorAll('input, textarea, select');
        inputs.forEach(input => {
            input.addEventListener('input', () => {
                isFormDirty = true; // Если ввели хоть букву - помечаем форму как измененную
            });
        });

        // Если пользователь легально отправляет форму (нажал кнопку), 
        // отключаем предупреждение, чтобы оно не мешало публикации
        form.addEventListener('submit', () => {
            isSubmitting = true;
        });

        // Событие beforeunload срабатывает, когда пользователь закрывает вкладку, 
        // обновляет страницу или нажимает кнопку "Назад" в браузере
        window.addEventListener('beforeunload', (event) => {
            if (isFormDirty && !isSubmitting) {
                // Стандартное сообщение для современных браузеров
                const message = "У вас есть несохраненные данные. Точно хотите уйти?";
                event.returnValue = message; // Нужно для Chrome/Edge
                return message; // Нужно для старых браузеров
            }
        });

    });
</script>

</body>
</html>
