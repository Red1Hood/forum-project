<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход на форум</title>
    <!-- Подключаем Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* Легкий серый фон страницы */
        body { 
            background-color: #f8f9fa; 
        }
        /* Делаем карточку чуть более скругленной */
        .card {
            border-radius: 1rem;
        }
    </style>
</head>

<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <!-- Сделал колонку чуть уже (col-md-5 col-lg-4), широкие формы логина смотрятся плохо -->
        <div class="col-md-5 col-lg-4">
            
            <div class="card shadow border-0 mt-4">
                <!-- Увеличил внутренние отступы p-4 -->
                <div class="card-body p-4 p-sm-5">
                    
                    <!-- Приветственный заголовок -->
                    <div class="text-center mb-4">
                        <h2 class="fw-bold mb-1">С возвращением! 👋</h2>
                        <p class="text-muted small">Пожалуйста, войдите в свой аккаунт</p>
                    </div>

                    <form method="post">
                        {% csrf_token %}

                        <!-- Плавающее поле для логина -->
                        <div class="form-floating mb-3">
                            <input 
                                type="text" 
                                name="username" 
                                class="form-control" 
                                id="floatingLogin" 
                                placeholder="Логин" 
                                required>
                            <label for="floatingLogin text-muted">Логин</label>
                        </div>

                        <!-- Плавающее поле для пароля -->
                        <div class="form-floating mb-4">
                            <input 
                                type="password" 
                                name="password" 
                                class="form-control" 
                                id="floatingPassword" 
                                placeholder="Пароль" 
                                required>
                            <label for="floatingPassword text-muted">Пароль</label>
                        </div>

                        <!-- Кнопка войти -->
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">
                            Войти
                        </button>

                    </form>

                    <!-- Ссылки внизу -->
                    <div class="mt-4 text-center">
                        <p class="mb-2 small">
                            Ещё нет аккаунта? 
                            <a href="/register/" class="text-decoration-none fw-bold">Зарегистрироваться</a>
                        </p>
                        <a href="/" class="text-decoration-none text-secondary small">
                            &larr; Вернуться на главную
                        </a>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
