<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактирование темы</title>
    <!-- Подключаю Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* Легкий серый фон страницы */
        body { background-color: #f8f9fa; }
        
        /* Делаю стандартную форму Django красивой */
        form p {
            margin-bottom: 1.5rem;
        }
        form p label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #495057;
        }
        form p input[type="text"], 
        form p textarea, 
        form p select {
            display: block;
            width: 100%;
            padding: 0.5rem 0.75rem;
            font-size: 1rem;
            line-height: 1.5;
            color: #212529;
            background-color: #fff;
            border: 1px solid #ced4da;
            border-radius: 0.375rem;
            transition: border-color .15s ease-in-out, box-shadow .15s ease-in-out;
        }
        /* При фокусе делаю подсветку желтовато-оранжевой (под цвет кнопки редактирования) */
        form p input:focus, 
        form p textarea:focus, 
        form p select:focus {
            border-color: #ffc107;
            outline: 0;
            box-shadow: 0 0 0 0.25rem rgba(255, 193, 7, 0.25);
        }
        form p textarea {
            min-height: 200px; /* Делаю поле для текста побольше */
        }
        ul.errorlist {
            color: #dc3545;
            list-style: none;
            padding: 0;
            font-size: 0.875em;
            margin-top: 0.25rem;
        }
    </style>
</head>

<body>

<div class="container mt-5 pb-5">

    <div class="row">
        <div class="col-lg-8 col-md-10 mx-auto">
            
            <!-- Кнопка назад -->
            <a href="/post/{{ post.id }}/" class="text-decoration-none text-secondary mb-3 d-inline-block">
                &larr; Отменить и вернуться к теме
            </a>

            <!-- Карточка формы -->
            <div class="card shadow-sm border-0 border-top border-warning border-4">
                <div class="card-body p-4 bg-white">
                    
                    <div class="d-flex align-items-center mb-4">
                        <span class="fs-3 me-3">✏️</span>
                        <div>
                            <h2 class="mb-0">Редактирование темы</h2>
                            <p class="text-muted small mb-0">Внесите нужные изменения и сохраните</p>
                        </div>
                    </div>

                    <form method="post">
                        {% csrf_token %}

                        <!-- Вывод полей Django -->
                        {{ form.as_p }}

                        <hr class="my-4 text-muted">

                        <div class="d-flex justify-content-between align-items-center">
                            <!-- Кнопка сброса (JS встроен в HTML) -->
                            <button type="button" onclick="window.location.reload();" class="btn btn-outline-secondary btn-sm">
                                ↺ Сбросить изменения
                            </button>
                            
                            <button type="submit" class="btn btn-warning px-4 fw-bold shadow-sm">
                                Сохранить изменения
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
