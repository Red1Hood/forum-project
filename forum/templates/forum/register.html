<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация на форуме</title>
    <!-- Подключаю Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* Легкий серый фон страницы */
        body { background-color: #f8f9fa; }
        
        .card { border-radius: 1rem; }
        
        /* Стилизирую стандартную форму регистрации Django */
        form p {
            margin-bottom: 1.2rem;
        }
        form p label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: #495057;
            font-size: 0.95rem;
        }
        form p input[type="text"], 
        form p input[type="password"], 
        form p input[type="email"] {
            display: block;
            width: 100%;
            padding: 0.6rem 0.75rem;
            font-size: 1rem;
            line-height: 1.5;
            color: #212529;
            background-color: #fff;
            border: 1px solid #ced4da;
            border-radius: 0.375rem;
            transition: border-color .15s ease-in-out, box-shadow .15s ease-in-out;
        }
        form p input:focus {
            border-color: #198754; /* Зеленое свечение при фокусе */
            outline: 0;
            box-shadow: 0 0 0 0.25rem rgba(25, 135, 84, 0.25);
        }
        
        /* Стилизирую подсказки (требования к паролю) от Django */
        .helptext {
            font-size: 0.8rem;
            color: #6c757d;
            display: block;
            margin-top: 0.3rem;
        }
        /* Стилизирую ошибки, если пользователь ввел что-то не так */
        ul.errorlist {
            color: #dc3545;
            background-color: #f8d7da;
            border-radius: 0.25rem;
            padding: 0.5rem 0.5rem 0.5rem 1.5rem;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            margin-bottom: 0;
        }
    </style>
</head>

<body>

<div class="container mt-5 pb-5">
    <div class="row justify-content-center">
        <!-- Колонка для регистрации обычно нужна чуть шире, чем для логина -->
        <div class="col-md-7 col-lg-5">

            <div class="card shadow border-0 mt-3">
                <div class="card-body p-4 p-sm-5">

                    <!-- Заголовок -->
                    <div class="text-center mb-4">
                        <h2 class="fw-bold mb-1">Создать аккаунт 🚀</h2>
                        <p class="text-muted small">Присоединяйтесь к нашему сообществу</p>
                    </div>

                    <form method="post">
                        {% csrf_token %}

                        <!-- Вывод полей Django -->
                        {{ form.as_p }}

                        <!-- Согласие с правилами (чисто визуальная галочка) -->
                        <div class="form-check mb-4 mt-3">
                            <input class="form-check-input" type="checkbox" id="rulesCheck" required>
                            <label class="form-check-label small text-muted" for="rulesCheck">
                                Я согласен с <a href="#" class="text-decoration-none">правилами форума</a>
                            </label>
                        </div>

                        <button type="submit" class="btn btn-success w-100 py-2 fw-bold shadow-sm">
                            Зарегистрироваться
                        </button>

                    </form>

                    <!-- Ссылки внизу -->
                    <div class="mt-4 text-center">
                        <p class="mb-2 small">
                            Уже есть аккаунт? 
                            <a href="/login/" class="text-decoration-none fw-bold">Войти</a>
                        </p>
                        <a href="/" class="text-decoration-none text-secondary small">
                            &larr; Вернуться на главную
                        </a>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
